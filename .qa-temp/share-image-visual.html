function escapeXml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]));
}
function wrapText(value, maxChars) {
  const words = String(value ?? '').trim().split(/\s+/).filter(Boolean);
  if (!words.length) return [''];
  const lines = []; let line = words.shift();
  words.forEach(word => {
    const candidate = `${line} ${word}`;
    if (candidate.length > maxChars) { lines.push(line); line = word; return; }
    line = candidate;
  });
  lines.push(line); return lines;
}

    push(`<text x="704" y="${cursorY + 52}" fill="#17324a" font-family="Arial, sans-serif" font-size="16" font-weight="700">${escapeXml(item.quantity)} u.  |  ${escapeXml(item.unit)}</text>`);

  push('</svg>');
  return parts.join('');
