<header th:fragment="header(pageTitle)"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        class="app-header">

    <div class="app-header__inner">
        <div class="flex min-w-0 items-center gap-3">
            <button type="button"
                    class="header-toggle md:hidden"
                    @click="$dispatch('open-sidebar')"
                    aria-label="Abrir menu">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M3 12h18"></path>
                    <path d="M3 18h18"></path>
                </svg>
            </button>

            <button type="button"
                    class="header-toggle hidden md:inline-flex"
                    @click="$dispatch('toggle-sidebar')"
                    aria-label="Ocultar o mostrar menu">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 6h16"></path>
                    <path d="M4 12h10"></path>
                    <path d="M4 18h16"></path>
                </svg>
            </button>

            <a th:href="@{/dashboard}" class="header-brand">
                <span class="header-brand__mark">M</span>
                <span class="header-brand__copy">
                    <span class="header-brand__name">Maidav</span>
                    <span class="header-brand__page" th:text="${pageTitle} ?: 'Operacion diaria'">Operacion diaria</span>
                </span>
            </a>
        </div>

        <div class="header-actions">
            <a sec:authorize="hasAuthority('PRODUCT_READ')"
               th:href="@{/products(lowStock=true)}"
               class="stock-pill"
               th:attr="title=${lowStockCount > 0 ? 'Stock bajo: ' + lowStockCount : 'Sin alertas de stock'}">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
                    <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
                </svg>
                <span class="stock-pill__label">Alertas de stock</span>
                <span class="stock-pill__count" th:text="${lowStockCount}">0</span>
            </a>

            <div class="user-menu" x-data="{ open: false }">
                <button type="button"
                        @click="open = !open"
                        class="user-button">
                    <span class="user-avatar">
                        <img th:if="${currentUser != null && currentUser.photoPath != null}"
                             th:src="${currentUser.photoPath}"
                             alt="Foto"
                             class="h-full w-full object-cover"/>
                        <span th:if="${currentUser == null || currentUser.photoPath == null}"
                              th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                    </span>
                    <span class="user-email">
                        <small>Sesion</small>
                        <span th:text="${currentUser != null ? currentUser.email : #authentication.name}">usuario@mail.com</span>
                    </span>
                    <svg class="h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m6 9 6 6 6-6"></path>
                    </svg>
                </button>

                <div x-show="open"
                     x-cloak
                     @click.outside="open = false"
                     x-transition.opacity.scale.origin.top.right
                     class="user-dropdown">
                    <a th:href="@{/profile}">Mi perfil</a>

                    <form th:action="@{/logout}" method="post">
                        <button type="submit">Cerrar sesion</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</header>
