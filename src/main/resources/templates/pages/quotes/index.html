<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout/main :: layout(~{::content}, 'Presupuestos')">

<section th:fragment="content">

    <div class="mx-auto max-w-5xl">
        <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.25em] text-blue-700">Maidav</p>
                <h1 class="text-3xl font-bold text-slate-900">Presupuestos</h1>
                <p class="mt-1 text-sm text-slate-600">
                    Cada vendedor solo ve los presupuestos que guardo con su usuario.
                </p>
            </div>

            <a sec:authorize="hasAuthority('QUOTE_CREATE')"
               th:href="@{/quotes/new}"
               class="inline-flex items-center justify-center rounded-2xl bg-blue-700 px-5 py-3 text-sm font-semibold text-white shadow hover:bg-blue-800">
                + Nuevo presupuesto
            </a>
        </div>

        <div th:if="${successMessage}"
             class="mb-4 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700"
             th:text="${successMessage}">
        </div>

        <div th:if="${#lists.isEmpty(quotes)}"
             class="rounded-3xl border border-dashed border-slate-300 bg-white px-6 py-12 text-center shadow-sm">
            <h2 class="text-lg font-semibold text-slate-900">Todavia no hay presupuestos guardados</h2>
            <p class="mt-2 text-sm text-slate-600">
                Arma uno nuevo desde el presupuestador movil para dejarlo guardado en tu usuario.
            </p>
        </div>

        <div th:unless="${#lists.isEmpty(quotes)}" class="grid gap-4 md:grid-cols-2">
            <article th:each="quote : ${quotes}"
                     class="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-700">Presupuesto</p>
                        <h2 class="mt-1 text-xl font-semibold text-slate-900"
                            th:text="${quote.quoteNumber != null ? quote.quoteNumber : quote.id}">
                        </h2>
                    </div>
                    <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700"
                          th:text="${quote.priceMode.name() == 'WHOLESALE' ? 'Mayorista' : 'Minorista'}">
                    </span>
                </div>

                <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Fecha</p>
                        <p class="mt-1 font-semibold text-slate-900"
                           th:text="${#temporals.format(quote.createdAt, 'yyyy-MM-dd HH:mm')}">
                        </p>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Productos</p>
                        <p class="mt-1 font-semibold text-slate-900"
                           th:text="${quote.productSummary}">
                        </p>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Total productos</p>
                        <p class="mt-1 font-semibold text-slate-900"
                           th:text="${'$' + quote.totalAmount}">
                        </p>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Items</p>
                        <p class="mt-1 font-semibold text-slate-900"
                           th:text="${quote.itemCount + ' items'}">
                        </p>
                    </div>
                </div>

                <div class="mt-5 flex items-center justify-between">
                    <p class="text-sm text-slate-500"
                       th:text="${'Contado $' + quote.cashAmount + ' | Debito $' + quote.debitAmount}">
                    </p>
                    <a th:href="@{/quotes/{id}(id=${quote.id})}"
                       class="text-sm font-semibold text-blue-700 hover:text-blue-900">
                        Ver detalle
                    </a>
                </div>
            </article>
        </div>
    </div>

</section>
</html>
