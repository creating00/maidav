<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout/main :: layout(~{::content}, 'Detalle de presupuesto')">

<section th:fragment="content">
    <div class="mx-auto max-w-5xl">
        <div th:if="${successMessage}"
             class="mb-4 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700"
             th:text="${successMessage}">
        </div>

        <div class="overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-[0_24px_70px_-32px_rgba(15,23,42,0.45)]">
            <div class="bg-[radial-gradient(circle_at_top_left,_rgba(52,211,153,0.24),_transparent_32%),linear-gradient(135deg,_#0f172a_0%,_#134e4a_55%,_#14532d_100%)] px-6 py-6 text-white">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-[0.32em] text-emerald-200">Presupuesto comercial</p>
                        <h1 class="mt-2 text-3xl font-semibold"
                            th:text="${quote.quoteNumber != null ? quote.quoteNumber : 'Presupuesto'}">
                        </h1>
                        <p class="mt-2 text-sm text-slate-200">Detalle listo para reenviar en PDF con imagenes y financiacion.</p>
                    </div>
                    <span class="inline-flex rounded-full bg-white/15 px-3 py-1 text-xs font-semibold uppercase tracking-wide"
                          th:text="${quote.priceMode.name() == 'WHOLESALE' ? 'Mayorista' : 'Minorista'}">
                    </span>
                </div>
            </div>

            <div class="space-y-6 px-6 py-6">
                <div class="grid gap-3 sm:grid-cols-3">
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Guardado</p>
                        <p class="mt-1 text-sm font-semibold text-slate-900"
                           th:text="${#temporals.format(quote.createdAt, 'yyyy-MM-dd HH:mm')}">
                        </p>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Productos</p>
                        <p class="mt-1 text-sm font-semibold text-slate-900" th:text="${quote.itemCount}"></p>
                    </div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Total estimado</p>
                        <p class="mt-1 text-sm font-semibold text-slate-900" th:text="${'$' + quote.totalAmount}"></p>
                    </div>
                </div>

                <div class="grid gap-3 sm:grid-cols-2">
                    <div class="rounded-2xl bg-emerald-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-emerald-800">Contado</p>
                        <p class="mt-1 text-sm font-semibold text-emerald-900" th:text="${'$' + quote.cashAmount}"></p>
                    </div>
                    <div class="rounded-2xl bg-indigo-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-indigo-800">Debito / transferencia</p>
                        <p class="mt-1 text-sm font-semibold text-indigo-900" th:text="${'$' + quote.debitAmount}"></p>
                    </div>
                </div>

                <div>
                    <p class="mb-3 text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Carro de productos</p>
                    <div class="space-y-3">
                        <article th:each="item : ${quote.items}"
                                 class="quote-share-item grid gap-4 rounded-3xl border border-slate-200 bg-slate-50 px-4 py-4 md:grid-cols-[92px_minmax(0,1fr)_150px]"
                                 th:attr="data-share=${item.productDescription + ' (' + item.productCode + ') x ' + item.quantity},data-name=${item.productDescription},data-code=${item.productCode},data-image=${item.productImagePath},data-quantity=${item.quantity},data-unit=${'$' + item.unitPrice},data-line=${'$' + item.lineTotal}">
                            <div class="flex h-20 w-20 items-center justify-center overflow-hidden rounded-[1.25rem] bg-[linear-gradient(135deg,#dbeafe_0%,#dcfce7_100%)] ring-1 ring-slate-200">
                                <img th:if="${item.productImagePath}" th:src="${item.productImagePath}" alt="Producto" class="h-full w-full object-cover"/>
                                <span th:if="${item.productImagePath == null}" class="text-2xl font-semibold text-slate-500">+</span>
                            </div>
                            <div class="min-w-0">
                                <h2 class="truncate text-base font-semibold text-slate-900"
                                    th:text="${item.productDescription}">
                                </h2>
                                <p class="mt-1 text-sm text-slate-500" th:text="${'Cod: ' + item.productCode}"></p>
                                <p class="mt-2 text-sm font-semibold text-slate-700" th:text="${item.quantity + ' unidad/es'}"></p>
                            </div>
                            <div class="shrink-0 text-right">
                                <p class="text-xs uppercase tracking-wide text-slate-500">Unitario</p>
                                <p class="text-sm font-semibold text-slate-900" th:text="${'$' + item.unitPrice}"></p>
                                <p class="mt-2 text-xs uppercase tracking-wide text-slate-500">Subtotal</p>
                                <p class="text-sm font-semibold text-slate-900" th:text="${'$' + item.lineTotal}"></p>
                            </div>
                        </article>
                    </div>
                </div>

                <div>
                    <p class="mb-3 text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Opciones de financiacion</p>
                    <div class="overflow-hidden rounded-3xl border border-slate-200 bg-white">
                        <div th:each="plan, stat : ${quote.planOptions}"
                             class="quote-share-plan px-5 py-4"
                             th:attr="data-share=${plan.promoText != null && !plan.promoText.isBlank() ? plan.title + ' | ' + plan.promoText : plan.title},data-title=${plan.title},data-value=${plan.feeAmount != null ? '$' + plan.feeAmount : ''},data-note=${plan.promoText != null ? plan.promoText : ''}"
                             th:classappend="${!stat.last} ? ' border-b border-slate-200' : ''">
                            <p class="text-base font-semibold text-slate-900" th:text="${plan.title}"></p>
                            <p th:if="${plan.promoText != null && !plan.promoText.isBlank()}"
                               class="mt-2 inline-flex rounded-xl bg-amber-100 px-3 py-2 text-sm font-medium text-amber-900"
                               th:text="${plan.promoText}">
                            </p>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3 border-t border-slate-200 pt-6 sm:flex-row">
                    <button type="button"
                            id="shareQuoteButton"
                            class="inline-flex flex-1 items-center justify-center rounded-2xl bg-slate-950 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                        Compartir PDF
                    </button>
                    <button type="button"
                            id="shareQuoteImageButton"
                            class="inline-flex flex-1 items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                        Compartir imagen
                    </button>
                    <a th:href="@{/quotes/{id}/pdf(id=${quote.id})}"
                       target="_blank"
                       rel="noopener"
                       class="inline-flex flex-1 items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                        Ver PDF
                    </a>
                    <a th:href="@{/quotes}"
                       class="inline-flex flex-1 items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                        Volver al listado
                    </a>
                    <form sec:authorize="hasAuthority('QUOTE_DELETE')"
                          th:action="@{/quotes/{id}/delete(id=${quote.id})}"
                          method="post"
                          class="flex-1"
                          onsubmit="return confirm('Eliminar este presupuesto?');">
                        <button class="inline-flex w-full items-center justify-center rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700 transition hover:bg-red-100">
                            Eliminar
                        </button>
                    </form>
                </div>
                <p id="shareQuoteStatus" class="text-center text-sm text-slate-500"></p>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        (() => {
            localStorage.removeItem('maidav-quote-draft');

            const shareButton = document.getElementById('shareQuoteButton');
            const shareImageButton = document.getElementById('shareQuoteImageButton');
            const shareStatus = document.getElementById('shareQuoteStatus');
            if (!shareButton) {
                return;
            }

            const quoteNumber = /*[[${quote.quoteNumber}]]*/ 'Presupuesto';
            const totalAmount = /*[[${quote.totalAmount}]]*/ '0.00';
            const cashAmount = /*[[${quote.cashAmount}]]*/ '0.00';
            const debitAmount = /*[[${quote.debitAmount}]]*/ '0.00';
            const pdfUrl = /*[[@{/quotes/{id}/pdf(id=${quote.id})}]]*/ '';
            const items = Array.from(document.querySelectorAll('.quote-share-item'))
                .map(node => ({
                    share: node.dataset.share,
                    name: node.dataset.name || '',
                    code: node.dataset.code || '',
                    image: node.dataset.image || '',
                    quantity: node.dataset.quantity || '0',
                    unit: node.dataset.unit || '$0',
                    line: node.dataset.line || '$0'
                }))
                .filter(item => item.share);
            const plans = Array.from(document.querySelectorAll('.quote-share-plan'))
                .map(node => ({
                    share: node.dataset.share,
                    title: node.dataset.title || '',
                    value: node.dataset.value || '',
                    note: node.dataset.note || ''
                }))
                .filter(item => item.share);

            function escapeXml(value) {
                return String(value ?? '').replace(/[&<>"']/g, character => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&apos;'
                })[character]);
            }

            function wrapText(value, maxChars) {
                const words = String(value ?? '').trim().split(/\s+/).filter(Boolean);
                if (!words.length) {
                    return [''];
                }
                const lines = [];
                let line = words.shift();
                words.forEach(word => {
                    const candidate = `${line} ${word}`;
                    if (candidate.length > maxChars) {
                        lines.push(line);
                        line = word;
                        return;
                    }
                    line = candidate;
                });
                lines.push(line);
                return lines;
            }

            function buildShareText() {
                return [
                    quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                    '',
                    'Productos:',
                    items.map(item => '- ' + item.share).join('\n'),
                    '',
                    'Opciones de financiacion:',
                    plans.map(plan => '- ' + plan.share).join('\n'),
                    '',
                    'Contado: $' + cashAmount,
                    'Debito / transferencia: $' + debitAmount,
                    'Total estimado: $' + totalAmount
                ].join('\n');
            }

            function buildShareModel() {
                return {
                    title: quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                    subtitle: 'Detalle comercial listo para reenviar',
                    number: quoteNumber || 'Presupuesto',
                    totalProducts: 'Total estimado: $' + totalAmount,
                    cash: 'Contado: $' + cashAmount,
                    debit: 'Debito / transferencia: $' + debitAmount,
                    items: items.map(item => ({
                        name: item.name,
                        code: item.code,
                        image: item.image,
                        quantity: item.quantity,
                        unit: item.unit,
                        lineTotal: item.line
                    })),
                    plans: plans.map(plan => ({
                        label: plan.title,
                        value: plan.value,
                        note: plan.note
                    }))
                };
            }

            async function imageUrlToDataUrl(url) {
                if (!url) {
                    return '';
                }
                try {
                    const response = await fetch(url, {credentials: 'same-origin'});
                    if (!response.ok) {
                        return '';
                    }
                    const blob = await response.blob();
                    return await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(typeof reader.result === 'string' ? reader.result : '');
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                } catch (_) {
                    return '';
                }
            }

            async function hydrateShareModel(model) {
                const hydratedItems = await Promise.all(model.items.map(async item => ({
                    ...item,
                    imageDataUrl: await imageUrlToDataUrl(item.image)
                })));
                return {...model, items: hydratedItems};
            }

            function buildQuoteImageSvg(model) {
                const itemHeight = 92;
                const planHeight = 70;
                const height = 500 + (model.items.length * itemHeight) + (model.plans.length * planHeight);
                const parts = [];
                const push = line => parts.push(line);
                push(`<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="${height}" viewBox="0 0 1080 ${height}" fill="none">`);
                push('<defs>');
                push('<linearGradient id="bg" x1="0" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#fdfaf4"/><stop offset="1" stop-color="#f6f0e6"/></linearGradient>');
                push('<linearGradient id="hero" x1="0" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#17324a"/></linearGradient>');
                model.items.forEach((item, index) => {
                    push(`<clipPath id="item-image-clip-${index}"><rect x="78" y="${341 + (index * itemHeight)}" width="46" height="46" rx="16"/></clipPath>`);
                });
                push('</defs>');
                push(`<rect width="1080" height="${height}" rx="48" fill="url(#bg)"/>`);
                push('<circle cx="952" cy="112" r="120" fill="#0f766e" fill-opacity=".12"/>');
                push('<circle cx="120" cy="176" r="150" fill="#a86837" fill-opacity=".10"/>');
                push('<rect x="56" y="56" width="968" height="190" rx="36" fill="url(#hero)"/>');
                push(`<text x="96" y="112" fill="#f7fafc" font-family="Space Grotesk, Arial, sans-serif" font-size="34" font-weight="700">${escapeXml(model.title)}</text>`);
                push(`<text x="96" y="152" fill="#d1fae5" font-family="Manrope, Arial, sans-serif" font-size="20">${escapeXml(model.subtitle)}</text>`);
                push(`<text x="96" y="196" fill="#ffffff" font-family="IBM Plex Mono, monospace" font-size="16">${escapeXml(model.totalProducts)}</text>`);
                push(`<text x="96" y="222" fill="#ffffff" font-family="IBM Plex Mono, monospace" font-size="16">${escapeXml(model.cash)}  |  ${escapeXml(model.debit)}</text>`);
                push(`<rect x="726" y="96" width="244" height="90" rx="24" fill="rgba(255,255,255,.14)"/>`);
                push('<text x="754" y="126" fill="#e2e8f0" font-family="IBM Plex Mono, monospace" font-size="12" letter-spacing="2">PRESUPUESTO</text>');
                push(`<text x="754" y="160" fill="#ffffff" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">${escapeXml(model.number)}</text>`);

                push('<text x="56" y="292" fill="#17324a" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">Productos</text>');
                let cursorY = 326;
                model.items.forEach((item, index) => {
                    push(`<rect x="56" y="${cursorY}" width="968" height="76" rx="24" fill="#ffffff" stroke="#d8dfe6"/>`);
                    if (item.imageDataUrl) {
                        push(`<rect x="78" y="${cursorY + 15}" width="46" height="46" rx="16" fill="#ffffff" stroke="#d8dfe6"/>`);
                        push(`<image href="${item.imageDataUrl}" x="78" y="${cursorY + 15}" width="46" height="46" preserveAspectRatio="xMidYMid slice" clip-path="url(#item-image-clip-${index})"/>`);
                    } else {
                        push(`<rect x="78" y="${cursorY + 15}" width="46" height="46" rx="16" fill="#e2f1ef"/>`);
                        push(`<text x="101" y="${cursorY + 44}" fill="#0f766e" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700" text-anchor="middle">${escapeXml((item.name || '+').trim().slice(0, 2).toUpperCase())}</text>`);
                    }
                    const nameLines = wrapText(item.name, 44);
                    push(`<text x="144" y="${cursorY + 34}" fill="#17324a" font-family="Manrope, Arial, sans-serif" font-size="21" font-weight="700">${escapeXml(nameLines[0])}</text>`);
                    if (nameLines[1]) {
                        push(`<text x="144" y="${cursorY + 56}" fill="#475569" font-family="Manrope, Arial, sans-serif" font-size="15">${escapeXml(nameLines[1])}</text>`);
                    }
                    push(`<text x="704" y="${cursorY + 32}" fill="#64748b" font-family="IBM Plex Mono, monospace" font-size="12">Cod. ${escapeXml(item.code)}</text>`);
                    push(`<text x="704" y="${cursorY + 52}" fill="#17324a" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="700">${escapeXml(item.quantity)} u.  |  ${escapeXml(item.unit)}</text>`);
                    push(`<text x="914" y="${cursorY + 44}" fill="#17324a" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="end">${escapeXml(item.lineTotal)}</text>`);
                    cursorY += itemHeight;
                });

                push(`<text x="56" y="${cursorY + 18}" fill="#17324a" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">Financiacion</text>`);
                cursorY += 42;
                model.plans.forEach(plan => {
                    push(`<rect x="56" y="${cursorY}" width="968" height="54" rx="18" fill="#ffffff" stroke="#d8dfe6"/>`);
                    push(`<text x="82" y="${cursorY + 34}" fill="#17324a" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700">${escapeXml(plan.label)}</text>`);
                    push(`<text x="670" y="${cursorY + 34}" fill="#0f766e" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="700">${escapeXml(plan.value)}</text>`);
                    if (plan.note) {
                        push(`<text x="920" y="${cursorY + 34}" fill="#a86837" font-family="IBM Plex Mono, monospace" font-size="13" text-anchor="end">${escapeXml(plan.note)}</text>`);
                    }
                    cursorY += planHeight;
                });

                push('</svg>');
                return parts.join('');
            }

            async function svgToPngBlob(svgText) {
                const svgBlob = new Blob([svgText], {type: 'image/svg+xml;charset=utf-8'});
                const svgUrl = URL.createObjectURL(svgBlob);
                try {
                    const image = new Image();
                    image.decoding = 'async';
                    const loaded = new Promise((resolve, reject) => {
                        image.onload = resolve;
                        image.onerror = reject;
                    });
                    image.src = svgUrl;
                    await loaded;
                    const canvas = document.createElement('canvas');
                    canvas.width = image.naturalWidth;
                    canvas.height = image.naturalHeight;
                    const context = canvas.getContext('2d');
                    if (!context) {
                        throw new Error('No se pudo preparar el lienzo de la imagen.');
                    }
                    context.drawImage(image, 0, 0);
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    if (!blob) {
                        throw new Error('No se pudo generar la imagen del presupuesto.');
                    }
                    return blob;
                } finally {
                    URL.revokeObjectURL(svgUrl);
                }
            }

            async function downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.download = filename;
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1500);
            }

            function setStatus(message, tone) {
                if (!shareStatus) {
                    return;
                }
                shareStatus.textContent = message || '';
                shareStatus.className = 'text-center text-sm ' + (tone === 'error'
                    ? 'text-rose-600'
                    : tone === 'success'
                        ? 'text-emerald-700'
                        : 'text-slate-500');
            }

            async function shareQuote() {
                const text = buildShareText();
                try {
                    setStatus('Preparando PDF del presupuesto...', null);
                    const response = await fetch(pdfUrl, {headers: {'X-Requested-With': 'XMLHttpRequest'}});
                    if (!response.ok) {
                        throw new Error('No se pudo preparar el PDF del presupuesto.');
                    }
                    const blob = await response.blob();
                    const file = typeof File === 'function'
                        ? new File([blob], (quoteNumber || 'presupuesto') + '.pdf', {type: 'application/pdf'})
                        : null;
                    if (navigator.share && file && navigator.canShare && navigator.canShare({files: [file]})) {
                        await navigator.share({
                            title: quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                            text,
                            files: [file]
                        });
                        setStatus('PDF enviado al selector de apps para compartir.', 'success');
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.download = (quoteNumber || 'presupuesto') + '.pdf';
                    document.body.appendChild(anchor);
                    anchor.click();
                    anchor.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 1500);
                    if (navigator.share) {
                        await navigator.share({
                            title: quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                            text
                        });
                        setStatus('Se descargo el PDF y se compartio el resumen.', 'success');
                        return;
                    }
                    if (navigator.clipboard) {
                        await navigator.clipboard.writeText(text);
                        setStatus('PDF descargado y resumen copiado al portapapeles.', 'success');
                        return;
                    }
                } catch (error) {
                    if (error && error.name === 'AbortError') {
                        setStatus('Se cancelo el envio del presupuesto.', null);
                        return;
                    }
                }
                setStatus('No se pudo compartir el PDF del presupuesto.', 'error');
            }

            async function shareQuoteImage() {
                const text = buildShareText();
                try {
                    setStatus('Generando imagen del presupuesto...', null);
                    const pngBlob = await svgToPngBlob(buildQuoteImageSvg(await hydrateShareModel(buildShareModel())));
                    const file = typeof File === 'function'
                        ? new File([pngBlob], (quoteNumber || 'presupuesto') + '.png', {type: 'image/png'})
                        : null;
                    if (navigator.share && file && navigator.canShare && navigator.canShare({files: [file]})) {
                        await navigator.share({
                            title: quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                            text,
                            files: [file]
                        });
                        setStatus('Imagen enviada al selector de apps para compartir.', 'success');
                        return;
                    }
                    await downloadBlob(pngBlob, (quoteNumber || 'presupuesto') + '.png');
                    if (navigator.share) {
                        await navigator.share({
                            title: quoteNumber ? 'Presupuesto ' + quoteNumber : 'Presupuesto Maidav',
                            text
                        });
                        setStatus('La imagen se descargo y se compartio el resumen.', 'success');
                        return;
                    }
                    if (navigator.clipboard) {
                        await navigator.clipboard.writeText(text);
                    }
                    setStatus('La imagen se descargo y el resumen quedo listo para enviar.', 'success');
                } catch (error) {
                    if (error && error.name === 'AbortError') {
                        setStatus('Se cancelo el envio del presupuesto.', null);
                        return;
                    }
                    setStatus(error?.message || 'No se pudo compartir la imagen del presupuesto.', 'error');
                }
            }

            shareButton.addEventListener('click', shareQuote);
            shareImageButton?.addEventListener('click', shareQuoteImage);
        })();
    </script>

</section>
</html>
