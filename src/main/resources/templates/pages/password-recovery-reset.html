<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva contrasena</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-lg">
    <h1 class="text-2xl font-bold text-slate-900 text-center">Definir nueva contrasena</h1>
    <p class="mt-2 text-center text-sm text-slate-600">
        Ingrese el token temporal que le entrego un administrador y su nueva contrasena.
    </p>

    <div th:if="${errorMessage}"
         class="mt-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/password-recovery/reset}" method="post" class="mt-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700">Token temporal</label>
            <input type="text" name="token" th:value="${token}"
                   class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2.5 uppercase tracking-[0.3em] focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-200"
                   required/>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Nueva contrasena</label>
            <input type="password" name="newPassword"
                   class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2.5 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-200"
                   required/>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Confirmar nueva contrasena</label>
            <input type="password" name="confirmPassword"
                   class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2.5 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-200"
                   required/>
        </div>

        <button type="submit"
                class="w-full rounded-lg bg-sky-700 px-4 py-2.5 font-semibold text-white hover:bg-sky-800">
            Guardar nueva contrasena
        </button>
    </form>

    <div class="mt-5 text-center text-sm">
        <p class="text-slate-500">Si no tiene token, soliciteselo a un administrador.</p>
        <a th:href="@{/login}" class="mt-3 inline-block font-medium text-sky-700 hover:text-sky-900">Volver al login</a>
    </div>
</div>

</body>
</html>
