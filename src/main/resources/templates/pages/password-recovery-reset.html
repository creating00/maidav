<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contrasena | Maidav</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>

<body class="auth-shell">

<div class="auth-card">
    <p class="auth-kicker">Recuperacion</p>
    <h1 class="auth-heading">Definir nueva contrasena</h1>
    <p class="auth-copy">
        Ingresa el token temporal entregado por un administrador y establece una nueva clave.
    </p>

    <div th:if="${errorMessage}"
         class="mt-5 rounded border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/password-recovery/reset}" method="post" class="auth-stack">
        <div>
            <label class="block text-sm font-medium text-slate-700">Token temporal</label>
            <input type="text" name="token" th:value="${token}" autocomplete="one-time-code" required/>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Nueva contrasena</label>
            <input type="password" name="newPassword" autocomplete="new-password" required/>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Confirmar nueva contrasena</label>
            <input type="password" name="confirmPassword" autocomplete="new-password" required/>
        </div>

        <button type="submit" class="w-full bg-blue-600">
            Guardar nueva contrasena
        </button>
    </form>

    <div class="auth-footer">
        <p>Si no tienes token, solicitelo a un administrador.</p>
        <a th:href="@{/login}" class="auth-link">Volver al login</a>
    </div>
</div>

</body>
</html>
