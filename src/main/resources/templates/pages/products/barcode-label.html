<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiqueta de codigo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { margin: 0; background: white; }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 p-6">
<div class="mx-auto max-w-xl">
    <div class="no-print mb-4 flex items-center justify-between">
        <h1 class="text-xl font-semibold text-slate-900">Etiqueta imprimible</h1>
        <button onclick="window.print()" class="rounded-lg bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">
            Imprimir
        </button>
    </div>

    <div class="rounded-2xl border border-slate-300 bg-white p-6 shadow-sm">
        <p class="text-xs uppercase tracking-[0.25em] text-slate-500">Maidav</p>
        <h2 class="mt-2 text-lg font-semibold text-slate-900"
            th:text="${description != null && !description.isBlank() ? description : 'Producto sin descripcion'}"></h2>
        <p class="mt-1 text-sm text-slate-500"
           th:text="${productCode != null && !productCode.isBlank() ? 'Codigo interno: ' + productCode : 'Sin codigo interno'}"></p>

        <div class="mt-6 flex justify-center rounded-xl border border-dashed border-slate-300 bg-white p-4">
            <div th:utext="${barcodeSvg}"></div>
        </div>

        <p class="mt-3 text-center font-mono text-lg tracking-[0.3em] text-slate-800" th:text="${barcode}"></p>
    </div>
</div>
</body>
</html>
