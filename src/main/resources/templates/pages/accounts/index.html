<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="layout/main :: layout(~{::content}, 'Cuentas')">

<section th:fragment="content">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Cuentas de credito</h1>
    </div>

    <div th:if="${successMessage}"
         class="mb-4 rounded border border-green-200 bg-green-50 px-4 py-3 text-green-700">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}"
         class="mb-4 rounded border border-red-200 bg-red-50 px-4 py-3 text-red-700">
        <span th:text="${errorMessage}"></span>
    </div>

    <form method="get" th:action="@{/accounts}" class="mb-4 flex flex-wrap gap-2 items-center">
        <input type="text" name="q" th:value="${q}" placeholder="Buscar por ID, cuenta, DNI, nombre o estado"
               class="w-full md:w-96 border rounded px-4 py-2"/>
        <!-- FILTRO POR VENDEDOR -->
        <!-- FILTRO VENDEDOR FRONTEND -->
        <select name="sellerId"
                th:if="${!#lists.isEmpty(sellerOptions)}"
                class="border rounded px-4 py-2">
            <option value="" th:selected="${sellerId == null}">Todos los vendedores</option>
            <option th:each="seller : ${sellerOptions}"
                    th:value="${seller.id}"
                    th:selected="${sellerId != null && seller.id == sellerId}"
                    th:text="${seller.label}">
            </option>
        </select>
        <button class="px-4 py-2 rounded border border-gray-300 hover:bg-gray-100">Buscar</button>
    </form>

    <div class="grid gap-4">
        <article th:each="group : ${clientGroups}" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                <div>
                    <h2 class="text-xl font-semibold text-slate-900" th:text="${group.clientName}"></h2>
                    <p class="text-sm text-slate-500" th:text="${group.nationalId}"></p>
                </div>
                <div class="grid gap-3 sm:grid-cols-3">
                    <div class="rounded-xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Saldo total</p>
                        <p class="text-lg font-bold text-slate-900" th:text="${group.totalBalance}"></p>
                    </div>
                    <div class="rounded-xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Creditos activos</p>
                        <p class="text-lg font-bold text-slate-900" th:text="${group.activeCredits}"></p>
                    </div>
                    <div class="rounded-xl bg-slate-50 px-4 py-3">
                        <p class="text-xs uppercase tracking-wide text-slate-500">Estado</p>
                        <p class="text-sm font-semibold" th:text="${group.badgeLabel}" th:classappend="${' ' + group.badgeClass}"></p>
                    </div>
                </div>
            </div>

            <div class="mt-4 grid gap-3">
                <div th:each="account : ${group.accounts}"
                     class="rounded-xl border border-slate-200 bg-slate-50/70 px-4 py-4">
                    <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                        <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-5">
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">ID credito</p>
                                <p class="font-mono text-sm font-semibold text-slate-900" th:text="${account.id}"></p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">Nro. cuenta</p>
                                <p class="text-sm font-semibold text-slate-900"
                                   th:text="${account.accountNumber != null ? account.accountNumber : '-'}"></p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">Cuota actual</p>
                                <p class="text-sm font-semibold text-slate-900"
                                   th:text="${account.currentInstallment != null ? account.currentInstallment : '-'}"></p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">Frecuencia</p>
                                <p class="text-sm text-slate-700" th:text="${account.paymentFrequency}"></p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">Saldo</p>
                                <p class="text-sm font-semibold text-slate-900" th:text="${account.balance}"></p>
                            </div>
                            <div>
                                <p class="text-xs uppercase tracking-wide text-slate-500">Vencimientos</p>
                                <p class="text-sm text-slate-700" th:text="${account.dueSchedule}"></p>
                            </div>
                            <div th:if="${isAdmin}">
                                <p class="text-xs uppercase tracking-wide text-slate-500">Creada por</p>
                                <p class="text-sm text-slate-700" th:text="${account.sellerDisplay}"></p>
                            </div>
                        </div>

                        <div class="flex flex-col items-start gap-3 lg:items-end">
                            <span class="text-sm font-semibold" th:text="${account.badgeLabel}"
                                  th:classappend="${' ' + account.badgeClass}"></span>
                            <a th:href="@{/accounts/{id}(id=${account.id})}"
                               class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">
                                Ver detalle
                            </a>
                        </div>
                    </div>

                    <details class="mt-4 rounded-lg border border-slate-200 bg-white/90">
                        <summary class="cursor-pointer list-none px-4 py-3 text-sm font-semibold text-slate-700">
                            <div class="flex items-center justify-between gap-3">
                                <span>Productos de esta cuenta</span>
                                <span class="rounded-full bg-slate-100 px-2 py-1 text-xs text-slate-600"
                                      th:text="${#lists.size(account.products)} + ' item(s)'"></span>
                            </div>
                        </summary>
                        <div class="border-t border-slate-200 px-4 py-3">
                            <div th:if="${#lists.isEmpty(account.products)}"
                                 class="text-sm text-slate-500">
                                Esta cuenta no tiene productos asociados.
                            </div>
                            <div th:unless="${#lists.isEmpty(account.products)}"
                                 class="max-h-52 overflow-y-auto pr-2">
                                <div th:each="product : ${account.products}"
                                     class="grid grid-cols-1 gap-2 border-b border-slate-100 py-2 last:border-b-0 md:grid-cols-[1fr_auto_auto] md:items-center">
                                    <div>
                                        <p class="text-sm font-semibold text-slate-800"
                                           th:text="${product.description != null ? product.description : '-'}"></p>
                                        <p class="text-xs text-slate-500"
                                           th:text="${product.productCode != null ? 'Codigo: ' + product.productCode : 'Sin codigo'}"></p>
                                    </div>
                                    <p class="text-sm text-slate-700"
                                       th:text="${'x' + product.quantity}"></p>
                                    <p class="text-sm font-semibold text-slate-900"
                                       th:text="${product.lineTotal}"></p>
                                </div>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        </article>

        <div th:if="${#lists.isEmpty(clientGroups)}"
             class="rounded-xl bg-white px-4 py-8 text-center text-gray-500 shadow">
            No hay cuentas registradas
        </div>
    </div>

</section>
</html>
