<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Permisos')">

<section th:fragment="content">

    <div class="app-page-toolbar">
        <div class="app-page-toolbar__copy">
            <h1 class="text-2xl font-bold">Permisos</h1>
            <p>Control fino de acciones disponibles por modulo.</p>
        </div>

        <div class="app-page-toolbar__actions">
            <a th:href="@{/permissions/new}"
               class="bg-blue-600 text-white px-4 py-2 rounded">
                Nuevo permiso
            </a>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="app-simple-table">
            <thead>
            <tr>
                <th class="text-left">Nombre</th>
                <th class="text-right">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${permissions}">
                <td class="font-semibold" th:text="${p.name}"></td>
                <td class="text-right">
                    <div class="app-inline-actions">
                        <a th:href="@{|/permissions/${p.id}/edit|}"
                           class="text-blue-600">Editar</a>

                        <form th:action="@{|/permissions/${p.id}/delete|}"
                              method="post" class="inline">
                            <button class="text-red-600"
                                    onclick="return confirm('Eliminar?')">
                                Eliminar
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</section>
</html>
