<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/main :: layout(~{::content}, 'Cobranza')">

<section th:fragment="content">

    <div class="collections-page"
         th:attr="data-lookup-url=@{/collections/lookup},
                  data-register-url=@{/collections/register},
                  data-csrf-header=${_csrf.headerName},
                  data-csrf-token=${_csrf.token}">

        <style>
            .collections-page {
                font-family: Arial, sans-serif;
                background: #eef2f7;
                margin: 0;
                padding: 10px;
                border-radius: 18px;
            }

            .collections-page h2 {
                text-align: center;
                margin-bottom: 15px;
            }

            .collections-page .tarjeta {
                background: white;
                padding: 15px;
                border-radius: 12px;
                margin-bottom: 12px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.10);
            }

            .collections-page .campo {
                margin-bottom: 8px;
                font-size: 16px;
            }

            .collections-page input {
                width: 100%;
                padding: 10px;
                font-size: 16px;
                border-radius: 8px;
                border: 1px solid #ccc;
                margin-top: 4px;
                box-sizing: border-box;
            }

            .collections-page .botones {
                display: flex;
                gap: 10px;
                margin-top: 10px;
            }

            .collections-page button {
                flex: 1;
                padding: 12px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                color: white;
                cursor: pointer;
            }

            .collections-page button:disabled {
                opacity: 0.65;
                cursor: not-allowed;
            }

            .collections-page .buscar {
                background: #444;
                margin-top: 6px;
            }

            .collections-page .aplicar {
                background: #1e88e5;
            }

            .collections-page .efectivo {
                background: #27ae60;
            }

            .collections-page .debito {
                background: #2f80ed;
            }

            .collections-page .agregar {
                width: 100%;
                padding: 15px;
                font-size: 18px;
                background: #ff9800;
                border: none;
                border-radius: 10px;
                color: white;
                margin-top: 10px;
            }

            .collections-page .estadoA {
                color: red;
                font-weight: bold;
            }

            .collections-page .estadoD {
                color: green;
                font-weight: bold;
            }

            .collections-page .cobrado {
                margin-top: 10px;
                font-size: 18px;
                color: #27ae60;
                font-weight: bold;
            }

            .collections-page .error {
                margin-top: 10px;
                font-size: 16px;
                color: red;
                font-weight: bold;
            }

            .collections-page .totales {
                margin-top: 20px;
                background: white;
                padding: 15px;
                border-radius: 12px;
                font-size: 18px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            }

            .collections-page .detalle-link {
                display: inline-flex;
                margin-top: 10px;
                color: #1d4ed8;
                font-size: 14px;
                font-weight: bold;
                text-decoration: none;
            }

            .collections-page .detalle-link:hover {
                text-decoration: underline;
            }

            .collections-page .processing {
                margin-top: 10px;
                font-size: 15px;
                color: #1d4ed8;
                font-weight: bold;
            }

            @media (max-width: 640px) {
                .collections-page .botones {
                    flex-direction: column;
                }
            }
        </style>

        <h2>Cobranza del dia</h2>

        <div id="contenedor"></div>

        <button type="button" class="agregar" id="agregarCobro">+ Agregar cobro</button>

        <div class="totales">
            Efectivo: $<span id="totalEfectivo">0,00</span><br><br>
            Transferencia / Debito: $<span id="totalDebito">0,00</span><br><br>
            Total del dia: $<span id="totalGeneral">0,00</span>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            const root = document.querySelector('.collections-page');
            if (!root) {
                return;
            }

            const lookupUrl = root.dataset.lookupUrl;
            const registerUrl = root.dataset.registerUrl;
            const csrfHeader = root.dataset.csrfHeader;
            const csrfToken = root.dataset.csrfToken;
            const container = document.getElementById('contenedor');
            const addButton = document.getElementById('agregarCobro');
            const totalEfectivoEl = document.getElementById('totalEfectivo');
            const totalDebitoEl = document.getElementById('totalDebito');
            const totalGeneralEl = document.getElementById('totalGeneral');

            let totalEfectivo = 0;
            let totalDebito = 0;

            function money(value) {
                return Number(value || 0).toLocaleString('es-AR', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            function parseNumber(value) {
                if (typeof value === 'number') {
                    return Number.isFinite(value) ? value : 0;
                }
                let normalized = String(value || '')
                    .trim()
                    .replace(/\s+/g, '');
                if (normalized.includes(',') && normalized.includes('.')) {
                    normalized = normalized.replace(/\./g, '').replace(',', '.');
                } else if (normalized.includes(',')) {
                    normalized = normalized.replace(',', '.');
                }
                const parsed = parseFloat(normalized);
                return Number.isFinite(parsed) ? parsed : 0;
            }

            function approximatelyEqual(a, b) {
                return Math.abs(a - b) < 0.009;
            }

            function updateTotals() {
                totalEfectivoEl.textContent = money(totalEfectivo);
                totalDebitoEl.textContent = money(totalDebito);
                totalGeneralEl.textContent = money(totalEfectivo + totalDebito);
            }

            function resetMessages(card) {
                card.querySelector('.cobrado').innerHTML = '';
                card.querySelector('.processing').innerHTML = '';
                card.querySelector('.error').innerHTML = '';
            }

            function clearCardDetails(card) {
                card.dataset.accountId = '';
                card.dataset.cobrado = 'no';
                card.dataset.cashAmount = '0';
                card.dataset.financedAmount = '0';
                card.dataset.chargeAmount = '0';
                card.dataset.appliedCreditAmount = '0';
                card.dataset.expiredCashAmount = '0';
                card.dataset.cashPricingAvailable = 'no';
                card.dataset.operationToken = '';
                card.dataset.detailUrl = '';
                card.querySelector('.cliente').innerHTML = '';
                card.querySelector('.producto').innerHTML = '';
                card.querySelector('.cuota').innerHTML = '';
                card.querySelector('.contado').innerHTML = '';
                card.querySelector('.financiada').innerHTML = '';
                card.querySelector('.debe').innerHTML = '';
                card.querySelector('.estado').innerHTML = '';
                card.querySelector('.resumenCobro').innerHTML = '';
                card.querySelector('.detalle').innerHTML = '';
                card.querySelector('.cobro').value = '';
                resetMessages(card);
            }

            function buildCard() {
                const card = document.createElement('div');
                card.className = 'tarjeta';
                card.dataset.cobrado = 'no';
                card.innerHTML = `
                    <div class="campo">
                        ID credito
                        <input class="idcredito" inputmode="numeric" autocomplete="off">
                        <button type="button" class="buscar">Buscar credito</button>
                    </div>

                    <div class="campo cliente"></div>
                    <div class="campo producto"></div>
                    <div class="campo cuota"></div>
                    <div class="campo contado"></div>
                    <div class="campo financiada"></div>
                    <div class="campo debe"></div>
                    <div class="campo estado"></div>
                    <div class="campo resumenCobro"></div>

                    <div class="campo">
                        Cobro
                        <input class="cobro" inputmode="decimal" autocomplete="off">
                    </div>

                    <div class="botones">
                        <button type="button" class="aplicar">Aplicar cuota</button>
                    </div>

                    <div class="botones">
                        <button type="button" class="efectivo">EFECTIVO</button>
                        <button type="button" class="debito">TRANSF</button>
                    </div>

                    <div class="cobrado"></div>
                    <div class="processing"></div>
                    <div class="error"></div>
                    <div class="detalle"></div>
                `;

                card.querySelector('.buscar').addEventListener('click', function () {
                    buscarCredito(card);
                });
                card.querySelector('.aplicar').addEventListener('click', function () {
                    aplicarCuota(card);
                });
                card.querySelector('.efectivo').addEventListener('click', function () {
                    registrar(card, 'efectivo');
                });
                card.querySelector('.debito').addEventListener('click', function () {
                    registrar(card, 'debito');
                });
                card.querySelector('.idcredito').addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        buscarCredito(card);
                    }
                });

                return card;
            }

            async function buscarCredito(card) {
                resetMessages(card);
                const input = card.querySelector('.idcredito');
                const id = (input.value || '').trim();
                if (!/^\d+$/.test(id)) {
                    clearCardDetails(card);
                    card.querySelector('.error').textContent = 'Ingrese un ID de credito valido';
                    return;
                }

                try {
                    const response = await fetch(`${lookupUrl}?id=${encodeURIComponent(id)}`, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        clearCardDetails(card);
                        card.querySelector('.error').textContent = data.message || 'No se pudo buscar el credito';
                        return;
                    }

                    card.dataset.accountId = data.accountId || '';
                    card.dataset.cobrado = 'no';
                    card.dataset.cashAmount = data.cashAmount || 0;
                    card.dataset.financedAmount = data.financedAmount || 0;
                    card.dataset.chargeAmount = data.chargeAmount || 0;
                    card.dataset.appliedCreditAmount = data.appliedCreditAmount || 0;
                    card.dataset.expiredCashAmount = data.expiredCashAmount || 0;
                    card.dataset.cashPricingAvailable = data.cashPricingAvailable ? 'si' : 'no';
                    card.dataset.operationToken = '';
                    card.dataset.detailUrl = data.detailUrl || '';

                    card.querySelector('.cliente').textContent = `Cliente: ${data.clientName || '-'}`;
                    card.querySelector('.producto').textContent = `Producto: ${data.productName || '-'}`;
                    card.querySelector('.cuota').textContent = `Cuota: ${data.installmentNumber != null ? data.installmentNumber : '-'}`;
                    card.querySelector('.contado').textContent = data.cashPricingAvailable
                        ? `Cuota contado: $${money(data.cashAmount)}`
                        : 'Cuota contado: No aplica';
                    card.querySelector('.financiada').textContent = `Cuota financiada: $${money(data.financedAmount)}`;
                    card.querySelector('.debe').textContent = `Debe: $${money(data.balance)}`;
                    const overdueAmount = parseNumber(data.overdueAmount);
                    if (String(data.statusLabel || '').toUpperCase() === 'ATRASADO' && overdueAmount > 0) {
                        // MOSTRAR MONTO ATRASO
                        card.querySelector('.estado').innerHTML = `<span class="${data.statusCssClass || 'estadoA'}">${String(data.statusLabel || 'Atrasado').toUpperCase()} - $${money(overdueAmount)}</span>`;
                    } else {
                        card.querySelector('.estado').innerHTML = `<span class="${data.statusCssClass || 'estadoD'}">${String(data.statusLabel || 'Al dia').toUpperCase()}</span>`;
                    }
                    const chargeModeLabel = data.chargeModeLabel || 'Valor financiado';
                    card.querySelector('.cobro').value = Number(data.chargeAmount || 0).toFixed(2);
                    const appliedCreditAmount = parseNumber(data.appliedCreditAmount);
                    const expiredCashAmount = parseNumber(data.expiredCashAmount);
                    let resumenCobro = '';
                    if (appliedCreditAmount > 0) {
                        resumenCobro += `<div style="color:#047857;font-weight:700;">Saldo a favor aplicado: $${money(appliedCreditAmount)}</div>`;
                    }
                    if (expiredCashAmount > 0) {
                        resumenCobro += `<div style="color:#dc2626;font-weight:700;text-decoration:line-through;">Contado vencido: $${money(expiredCashAmount)}</div>`;
                    }
                    card.querySelector('.resumenCobro').innerHTML = resumenCobro;
                    card.querySelector('.detalle').innerHTML = `
                        <div class="detalle-link" style="display:block;color:#0f172a;text-decoration:none;font-weight:700;">
                            ${chargeModeLabel} vigente: $${money(data.chargeAmount)}
                        </div>
                        ${data.detailUrl ? `<a class="detalle-link" href="${data.detailUrl}">Ver detalle de la cuenta</a>` : ''}
                    `;
                } catch (error) {
                    clearCardDetails(card);
                    card.querySelector('.error').textContent = 'No se pudo consultar el credito';
                }
            }

            function aplicarCuota(card) {
                resetMessages(card);
                if (card.dataset.cobrado === 'si') {
                    card.querySelector('.error').textContent = 'YA INGRESO EL PAGO';
                    return;
                }
                if (!card.dataset.accountId) {
                    card.querySelector('.error').textContent = 'Busque un credito antes de aplicar la cuota';
                    return;
                }

                const monto = parseNumber(card.querySelector('.cobro').value);
                if (monto <= 0) {
                    card.querySelector('.error').textContent = 'Ingrese un monto valido para aplicar';
                    return;
                }

                card.querySelector('.cobrado').textContent = `CUOTA APLICADA $${money(monto)}`;
            }

            function resolveAmountForType(card, tipo) {
                const amountInput = card.querySelector('.cobro');
                const typedAmount = parseNumber(amountInput.value);
                const chargeDefault = parseNumber(card.dataset.chargeAmount);
                const financedDefault = parseNumber(card.dataset.financedAmount);
                const methodDefault = tipo === 'efectivo'
                    ? chargeDefault
                    : (financedDefault > 0 ? financedDefault : chargeDefault);
                const oppositeDefault = tipo === 'efectivo'
                    ? (financedDefault > 0 ? financedDefault : chargeDefault)
                    : chargeDefault;
                if (typedAmount <= 0) {
                    amountInput.value = methodDefault.toFixed(2);
                    return methodDefault;
                }
                if (approximatelyEqual(typedAmount, chargeDefault) || approximatelyEqual(typedAmount, oppositeDefault)) {
                    amountInput.value = methodDefault.toFixed(2);
                    return methodDefault;
                }
                return typedAmount;
            }

            async function registrar(card, tipo) {
                resetMessages(card);
                if (card.dataset.cobrado === 'si') {
                    card.querySelector('.error').innerHTML = 'YA INGRESO EL PAGO<br>Agregue otro cobro si quiere registrar otro pago';
                    return;
                }
                if (!card.dataset.accountId) {
                    card.querySelector('.error').textContent = 'Busque un credito antes de registrar el cobro';
                    return;
                }

                const monto = resolveAmountForType(card, tipo);
                if (monto <= 0) {
                    card.querySelector('.error').textContent = 'Ingrese un monto valido para registrar';
                    return;
                }

                const paymentMethod = tipo === 'efectivo' ? 'CASH' : 'BANK';
                const paymentLabel = tipo === 'efectivo' ? 'efectivo' : 'transferencia / debito';
                // CONFIRMACION COBRANZA
                const confirmed = window.confirm(`Esta por registrar un pago en ${paymentLabel} por $${money(monto)}. Desea continuar?`);
                if (!confirmed) {
                    return;
                }
                const body = new URLSearchParams();
                const operationToken = `collection-${card.dataset.accountId}-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
                body.set('accountId', card.dataset.accountId);
                body.set('amount', monto.toFixed(2));
                body.set('paymentMethod', paymentMethod);
                body.set('operationToken', operationToken);
                card.dataset.operationToken = operationToken;
                const actionButtons = Array.from(card.querySelectorAll('button'));
                // PREVENIR DOBLE PAGO
                actionButtons.forEach(button => {
                    button.disabled = true;
                });
                card.querySelector('.processing').textContent = 'Procesando cobro...';

                try {
                    const response = await fetch(registerUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
                            'X-Requested-With': 'XMLHttpRequest',
                            [csrfHeader]: csrfToken
                        },
                        body: body.toString()
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        card.querySelector('.error').textContent = data.message || 'No se pudo registrar el pago';
                        return;
                    }

                    card.dataset.cobrado = 'si';
                    card.querySelector('.cobro').value = Number(data.amount || monto).toFixed(2);
                    if (tipo === 'efectivo') {
                        totalEfectivo += Number(data.amount || monto);
                    } else {
                        totalDebito += Number(data.amount || monto);
                    }
                    updateTotals();
                    card.querySelector('.processing').textContent = '';

                    let message = `COBRADO $${money(data.amount || monto)}`;
                    if (data.paymentMethodLabel) {
                        message += ` - ${data.paymentMethodLabel}`;
                    }
                    if (data.detailUrl) {
                        message += ` <a class="detalle-link" href="${data.detailUrl}">Ver pagos</a>`;
                    }
                    card.querySelector('.cobrado').innerHTML = message;
                } catch (error) {
                    card.querySelector('.error').textContent = 'No se pudo registrar el cobro';
                } finally {
                    if (card.dataset.cobrado !== 'si') {
                        card.dataset.operationToken = '';
                    }
                    actionButtons.forEach(button => {
                        button.disabled = card.dataset.cobrado === 'si';
                    });
                    if (card.dataset.cobrado !== 'si') {
                        card.querySelector('.processing').textContent = '';
                    }
                }
            }

            function agregarTarjeta() {
                container.appendChild(buildCard());
            }

            addButton.addEventListener('click', agregarTarjeta);
            agregarTarjeta();
            updateTotals();
        })();
    </script>

</section>
</html>
